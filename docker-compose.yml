# AGenNext Enterprise - Production Docker Compose
services:
  # Backend API (FastAPI)
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: agennext/server:latest
    container_name: agennext-server
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    # Production: Restart only on failures
    restart: unless-stopped
    # Security: Run as non-root
    user: appuser
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/frameworks"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend UI (Next.js)
  ui:
    build:
      context: ./agennext-ui
      dockerfile: ../Dockerfile
    image: agennext/ui:latest
    container_name: agennext-ui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://server:8000
      - PORT=3000
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    # Security: Run as non-root
    user: nextjs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: agennext-redis
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    restart: unless-stopped
    # Security: Run as non-root
    user: redis
    volumes:
      - redis-data:/data
    # AOF for persistence
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
    driver: local

networks:
  default:
    name: agennext-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
