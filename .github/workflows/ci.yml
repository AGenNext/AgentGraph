name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install flake8 black mypy
      
      - name: Lint with flake8
        run: |
          flake8 agents/ ui/ --max-line-length=100 --ignore=E501,W503
      
      - name: Check formatting
        run: |
          black --check agents/ ui/

  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          echo "No tests yet"

  build-ui:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agennext-ui/package-lock.json
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: agennext-ui
      
      - name: Build
        run: npm run build
        working-directory: agennext-ui
      
      - name: Type check
        run: npx tsc --noEmit
        working-directory: agennext-ui

  e2e:
    runs-on: ubuntu-latest
    needs: build-ui
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: agennext-ui
      
      - name: Run E2E tests
        run: npx playwright test --reporter=line
        working-directory: agennext-ui

  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: agennext-ui

  docker:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: agennext/agent-registry:test
          labels: |
            org.opencontainers.image.source=https://github.com/AGenNext/AGenNext-Enterprise
            org.opencontainers.image.description=Enterprise Multi-Agent Platform
      
      - name: Verify image
        run: |
          docker run --rm agennext/agent-registry:test python --version
