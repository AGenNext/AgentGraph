name: Deploy

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to Coolify
        run: |
          SERVICE_UUID="${COOLIFY_SERVICE_UUID:-md4kbbkx6lcxc8uny6q1p6ca}"
          COOLIFY_URL="${COOLIFY_URL:-http://vps.openautonomyx.com:8000}"
          API_TOKEN="${{ secrets.COOLIFY_API_TOKEN }}"
          curl -s -X POST "$COOLIFY_URL/api/v1/services/$SERVICE_UUID/start" \
            -H "Authorization: Bearer $API_TOKEN"

  test:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Wait for service
        run: sleep 30
      
      - name: Test API health
        run: |
          BACKEND_URL="${BACKEND_URL:-http://vps.openautonomyx.com:8000}"
          curl -s "$BACKEND_URL/" | grep -q "A2A" && echo "✓ Backend health OK"

      - name: Test tasks endpoint
        run: |
          BACKEND_URL="${BACKEND_URL:-http://vps.openautonomyx.com:8000}"
          curl -s "$BACKEND_URL/tasks" | grep -q "tasks" && echo "✓ Tasks endpoint OK"

      - name: Test agents endpoint
        run: |
          BACKEND_URL="${BACKEND_URL:-http://vps.openautonomyx.com:8000}"
          curl -s "$BACKEND_URL/agents" | grep -q "agents" && echo "✓ Agents endpoint OK"

  security:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy, test, security]
    
    steps:
      - name: Create GitHub Release
        if: github.event_name == 'release'
        run: |
          echo "Release ${{ github.event.release.tag_name }} deployed and tested"
