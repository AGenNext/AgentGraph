name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_HUB_REGISTRY: docker.io
  DOCKER_HUB_REPO: agennext/agennext-enterprise

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_HUB_REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKER_HUB_REGISTRY }}/${{ env.DOCKER_HUB_REPO }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{version}},prefix=v,enable={{is_default_branch}}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.DOCKER_HUB_REGISTRY }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }},${{ env.DOCKER_HUB_REGISTRY }}/${{ env.DOCKER_HUB_REPO }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Coolify
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COOLIFY_HOST: ${{ secrets.COOLIFY_HOST }}
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
          RESOURCE_UUID: ${{ secrets.COOLIFY_RESOURCE_UUID }}
        run: |
          if [ -n "$COOLIFY_HOST" ] && [ -n "$COOLIFY_API_KEY" ] && [ -n "$RESOURCE_UUID" ]; then
            echo "Deploying to Coolify..."
            IMAGE_TAG="${{ steps.meta.outputs.tags }}"
            curl -s -X POST "$COOLIFY_HOST/api/v1/deploy?uuid=$RESOURCE_UUID&tag=latest" \
              -H "Authorization: Bearer $COOLIFY_API_KEY" \
              -H "Content-Type: application/json" || echo "Deploy failed"
          else
            echo "Skipping deploy - COOLIFY_HOST, COOLIFY_API_KEY, or RESOURCE_UUID not configured"
          fi