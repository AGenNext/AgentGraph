name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{version}},prefix=v,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Coolify
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK || 'https://coolify.example.com/api/deploy' }}
        run: |
          if [ -n "$COOLIFY_WEBHOOK" ] && [ "$COOLIFY_WEBHOOK" != "https://coolify.example.com/api/deploy" ]; then
            echo " deploying to Coolify..."
            curl -s -X POST "$COOLIFY_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d '{"text": "Image ${{ steps.meta.outputs.tags }} deployed"}' || echo "Webhook call failed"
          else
            echo "Skipping deploy - COOLIFY_WEBHOOK not configured"
            echo "Set secrets.COOLIFY_WEBHOOK in GitHub repo settings to enable"
          fi