name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'agennext-ui/**'
  workflow_dispatch:

jobs:
  deploy-coolify:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to Coolify
        run: |
          # Get Coolify service UUID (hardcoded for now)
          SERVICE_UUID="nr2g1d5tdb3b5sc41pm863a7"
          COOLIFY_URL="http://vps.openautonomyx.com:8000"
          API_TOKEN="${{ secrets.COOLIFY_API_TOKEN }}"
          
          # Trigger deployment
          curl -s -X POST "$COOLIFY_URL/api/v1/services/$SERVICE_UUID/start" \
            -H "Authorization: Bearer $API_TOKEN"