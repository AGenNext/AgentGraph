# Dependabot Configuration
# Auto-update dependencies and Docker base images

version: 2
updates:
  # ============================================================
  # Python Dependencies
  # ============================================================
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "pip"
      include: "scope"
    labels:
      - "dependencies"
      - "automerge"
    reviewers:
      - "AGenNext/team"
    groups:
      production-dependencies:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  # ============================================================
  # GitHub Actions
  # ============================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    commit-message:
      prefix: "github-actions"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

  # ============================================================
  # Docker
  # ============================================================
  - package-ecosystem: "docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    # Update base image quarterly to avoid breaking changes
    ignore:
      - dependency-name: "python"
        update-types: ["major"]